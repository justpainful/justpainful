<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Windows XP style profile card" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="title" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4e9cf2"/>
      <stop offset="0.36" stop-color="#1d70cf"/>
      <stop offset="1" stop-color="#0754bc"/>
    </linearGradient>
    <linearGradient id="task" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4bb846"/>
      <stop offset="1" stop-color="#258327"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff5fb"/>
    </linearGradient>
  </defs>

  <!-- desktop frame -->
  <rect x="4" y="4" width="1192" height="492" fill="#0a3f91"/>
  <rect x="8" y="8" width="1184" height="484" fill="#ece9d8" stroke="#ffffff" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="42" fill="url(#title)"/>
  <rect x="8" y="48" width="1184" height="3" fill="#003c9d"/>

  <!-- titlebar -->
  <text x="25" y="34" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff">justpainful — My Profile</text>
  <g transform="translate(1082 15)">
    <rect width="26" height="22" fill="#4b9ff1" stroke="#d6ecff"/>
    <rect x="30" width="26" height="22" fill="#4b9ff1" stroke="#d6ecff"/>
    <rect x="60" width="26" height="22" fill="#e76d63" stroke="#ffd9d6"/>
    <path d="M8 13h10" stroke="#fff" stroke-width="2"/>
    <rect x="37" y="7" width="11" height="10" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M67 7l11 11M78 7L67 18" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- content surface -->
  <rect x="28" y="72" width="1144" height="356" fill="url(#panel)" stroke="#7f9db9"/>
  <rect x="28" y="72" width="1144" height="28" fill="#dce9f8" stroke="#a6bdd8"/>
  <text x="44" y="92" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="14" font-weight="700" fill="#1b3d6d">C:\Documents and Settings\justpainful\profile</text>

  <!-- left user tile -->
  <rect x="50" y="123" width="350" height="248" fill="#ffffff" stroke="#9db9d6" stroke-width="2"/>
  <rect x="50" y="123" width="350" height="34" fill="#e7f0fa"/>
  <text x="66" y="146" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" font-weight="700" fill="#1d4f91">user.profile</text>
  <!-- computer/user pixel icon -->
  <g transform="translate(73 182)">
    <rect width="92" height="73" fill="#245fbe"/>
    <rect x="5" y="5" width="82" height="54" fill="#85c7f8"/>
    <rect x="12" y="12" width="27" height="20" fill="#2d6bb8"/>
    <rect x="45" y="12" width="28" height="20" fill="#d7f0ff"/>
    <rect x="12" y="38" width="61" height="13" fill="#4ca443"/>
    <rect x="34" y="60" width="24" height="7" fill="#d7e5f3"/>
    <rect x="23" y="67" width="47" height="6" fill="#617f9c"/>
  </g>
  <text x="185" y="203" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="23" font-weight="700" fill="#173c70">justpainful</text>
  <text x="185" y="230" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" fill="#2f4f73">Software Engineer</text>
  <text x="185" y="252" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" fill="#2f4f73">Concept Engineer</text>
  <text x="185" y="274" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" fill="#2f4f73">Community Organizer</text>
  <rect x="73" y="305" width="302" height="1" fill="#d0dce8"/>
  <text x="73" y="331" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="14" fill="#3b5673">company: Flowline Inc.</text>
  <text x="73" y="354" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="14" fill="#3b5673">project groups: Max · Rootline</text>

  <!-- right system status tile -->
  <rect x="429" y="123" width="717" height="248" fill="#ffffff" stroke="#9db9d6" stroke-width="2"/>
  <rect x="429" y="123" width="717" height="34" fill="#e7f0fa"/>
  <text x="446" y="146" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" font-weight="700" fill="#1d4f91">system.status</text>

  <!-- rows -->
  <g font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" fill="#2f4f73">
    <rect x="457" y="181" width="14" height="14" fill="#30ad48"/>
    <text x="488" y="194">online</text>
    <text x="633" y="194" fill="#6d7f91">building product systems and developer tools</text>

    <rect x="457" y="218" width="14" height="14" fill="#3195df"/>
    <text x="488" y="231">working</text>
    <text x="633" y="231" fill="#6d7f91">full-stack engineering · AI-enabled workflows</text>

    <rect x="457" y="255" width="14" height="14" fill="#f1b536"/>
    <text x="488" y="268">organizing</text>
    <text x="633" y="268" fill="#6d7f91">community systems · team operations</text>

    <rect x="457" y="292" width="14" height="14" fill="#8759c9"/>
    <text x="488" y="305">focus</text>
    <text x="633" y="305" fill="#6d7f91">Max · Rootline · Flowline Inc.</text>
  </g>

  <rect x="457" y="327" width="664" height="1" fill="#d0dce8"/>
  <text x="457" y="352" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="13" fill="#5a7189">interface: Windows XP shell · pixel icons</text>

  <!-- taskbar -->
  <rect x="8" y="445" width="1184" height="47" fill="#245ec3"/>
  <rect x="17" y="452" width="162" height="32" fill="url(#task)" stroke="#1e6d25"/>
  <circle cx="39" cy="468" r="9" fill="#ffffff"/>
  <path d="M35 468h8M39 464v8" stroke="#35a33c" stroke-width="2"/>
  <text x="57" y="474" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff">start</text>
  <rect x="881" y="453" width="278" height="30" fill="#d9eaf9" stroke="#7197c0"/>
  <text x="899" y="473" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="13" fill="#31587a">Flowline Inc. · Max · Rootline</text>

  <!-- proper pixel Russian flag: 3:2, not a square tile -->
  <g transform="translate(1095 454)">
    <rect width="54" height="30" fill="#173d70"/>
    <rect x="2" y="2" width="50" height="9" fill="#ffffff"/>
    <rect x="2" y="11" width="50" height="9" fill="#2d62bb"/>
    <rect x="2" y="20" width="50" height="8" fill="#d9414a"/>
  </g>
</svg>
